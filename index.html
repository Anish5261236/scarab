<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect's Tomb | Chamber I</title>
    
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/03/31/15/20260331155126-C69DAEGZ.js" defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Cinematic Background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1539650116574-8efeb43e2750?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: -1;
        }

        /* Main Game Board */
        .game-board {
            width: 90%;
            max-width: 750px;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(212, 175, 55, 0.05);
            position: relative;
        }

        /* HUD elements */
        .header-hud {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 15px;
            margin-bottom: 30px;
            font-family: 'Cinzel', serif;
            color: #D4AF37;
            letter-spacing: 2px;
        }

        .timer {
            font-size: 1.5em;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            margin: 0 0 15px 0;
            letter-spacing: 3px;
            color: #e8c35a;
        }

        .puzzle-text {
            font-size: 1.1em;
            line-height: 1.8;
            color: #cccccc;
            margin-bottom: 40px;
            font-style: italic;
            padding: 0 20px;
        }

        /* --- NEW INTERACTIVE LOCK MECHANICS --- */
        .lock-mechanism {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .dial-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .dial {
            width: 80px;
            height: 100px;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 2px solid #D4AF37;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(212, 175, 55, 0.2);
            transition: transform 0.1s, box-shadow 0.3s;
        }

        .dial:active {
            transform: scale(0.95) translateY(5px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.8), inset 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .dial:hover {
            border-color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 25px rgba(212, 175, 55, 0.4);
        }

        .dial-label {
            font-family: 'Cinzel', serif;
            color: #888;
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        .submit-btn {
            background: transparent;
            color: #D4AF37;
            border: 2px solid #D4AF37;
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            padding: 15px 40px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 20px #D4AF37;
        }

        /* AI Helper Button */
        .ai-hint-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(10, 10, 10, 0.8);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 15px 25px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-hint-btn:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
        }

        .ai-hint-btn .pulse {
            width: 10px;
            height: 10px;
            background-color: #00ffcc;
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="game-board">
        <div class="header-hud">
            <div>LOCATION: ANTECHAMBER</div>
            <div class="timer" id="countdown">60:00</div>
        </div>

        <h2>The Scarab's Sequence</h2>
        <p class="puzzle-text">"To walk the path of the sun, align the elements of life. First the vessel, then the breath, and finally, the eternal guardian."</p>

        <div class="lock-mechanism">
            <div class="dial-container">
                <div class="dial" id="dial-0" onclick="rotateDial(0)">𓀀</div>
                <div class="dial-label">RING I</div>
            </div>
            <div class="dial-container">
                <div class="dial" id="dial-1" onclick="rotateDial(1)">𓀀</div>
                <div class="dial-label">RING II</div>
            </div>
            <div class="dial-container">
                <div class="dial" id="dial-2" onclick="rotateDial(2)">𓀀</div>
                <div class="dial-label">RING III</div>
            </div>
        </div>

        <button class="submit-btn" onclick="checkLock()">Engage Mechanism</button>
        
        <p id="feedback" style="margin-top: 20px; font-family: 'Cinzel', serif; font-size: 1.2em; display: none;"></p>
    </div>

    <button class="ai-hint-btn" onclick="openAI()">
        <div class="pulse"></div>
        ACCESS GUARDIAN AI
    </button>

    <script>
        // --- INTERACTIVE LOCK LOGIC ---
        // Array of ancient symbols to cycle through
        const symbols = ['𓀀', '𓃒', '𓆣', '𓉡', '𓋹', '𓎛'];
        
        // The current state of the 3 dials (indexes of the symbols array)
        let dialStates = [0, 0, 0];
        
        // The winning combination (Vessel 𓉡, Breath 𓋹, Guardian/Scarab 𓆣)
        const winningCombination = [3, 4, 2]; 

        function rotateDial(dialIndex) {
            // Move to the next symbol, loop back to 0 if at the end
            dialStates[dialIndex] = (dialStates[dialIndex] + 1) % symbols.length;
            
            // Update the HTML element to show the new symbol
            document.getElementById(`dial-${dialIndex}`).innerText = symbols[dialStates[dialIndex]];
            
            // Play a subtle click sound (optional, but adds to the professional feel)
            // new Audio('click.mp3').play(); 
        }

        function checkLock() {
            const feedback = document.getElementById('feedback');
            
            // Check if the current dial states match the winning combination
            if (dialStates[0] === winningCombination[0] && 
                dialStates[1] === winningCombination[1] && 
                dialStates[2] === winningCombination[2]) {
                
                feedback.style.color = "#00ff00";
                feedback.style.textShadow = "0 0 10px rgba(0, 255, 0, 0.5)";
                feedback.innerText = "Mechanism engaged. The heavy stone doors grind open...";
                feedback.style.display = "block";
                
                // Add a delay before moving to the next page
                // setTimeout(() => { window.location.href = 'chamber2.html'; }, 3000);
            } else {
                feedback.style.color = "#ff3333";
                feedback.style.textShadow = "0 0 10px rgba(255, 51, 51, 0.5)";
                feedback.innerText = "The gears grind, but the lock holds fast. The sequence is incorrect.";
                feedback.style.display = "block";
                
                // Shake animation for incorrect answer
                const gameBoard = document.querySelector('.game-board');
                gameBoard.style.transform = 'translateX(10px)';
                setTimeout(() => gameBoard.style.transform = 'translateX(-10px)', 50);
                setTimeout(() => gameBoard.style.transform = 'translateX(10px)', 100);
                setTimeout(() => gameBoard.style.transform = 'translateX(0)', 150);
            }
        }

        // --- TIMER LOGIC ---
        let timeLeft = 3600; 
        setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            document.getElementById('countdown').innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if(timeLeft > 0) timeLeft--;
        }, 1000);

        // --- BOTPRESS AI INTEGRATION ---
        window.botpressWebChat.init({
            "configUrl": "https://files.bpcontent.cloud/2026/03/31/15/20260331155126-9Z3W0Q00.json",
            "hostUrl": "https://cdn.botpress.cloud/webchat/v1",
            "hideWidget": true,
            "themeName": "prism",
            "theme": "dark"
        });

        function openAI() {
            window.botpressWebChat.sendEvent({ type: 'show' });
        }
    </script>
</body>
</html>
