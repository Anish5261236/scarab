<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect's Tomb | Chamber I</title>
    
    <script src="https://cdn.botpress.cloud/webchat/v1/inject.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Cinematic Background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1539650116574-8efeb43e2750?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: -1;
        }

        /* Main Game Board */
        .game-board {
            width: 90%;
            max-width: 700px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 10px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        /* HUD elements */
        .header-hud {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 15px;
            margin-bottom: 30px;
            font-family: 'Cinzel', serif;
            color: #D4AF37;
        }

        .timer {
            font-size: 1.5em;
            letter-spacing: 2px;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 2em;
            margin: 0 0 20px 0;
            letter-spacing: 2px;
        }

        .puzzle-text {
            font-size: 1.2em;
            line-height: 1.8;
            color: #e0e0e0;
            margin-bottom: 40px;
            font-style: italic;
        }

        /* Input area */
        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        input[type="text"] {
            padding: 15px 20px;
            font-size: 1.1em;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #D4AF37;
            border-radius: 5px;
            color: #fff;
            width: 60%;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
        }

        input[type="text"]:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .submit-btn {
            background: #D4AF37;
            color: #000;
            font-weight: bold;
            font-family: 'Cinzel', serif;
            border: none;
            padding: 0 30px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background: #fff;
            box-shadow: 0 0 20px #D4AF37;
        }

        /* AI Helper Button (Bottom Right) */
        .ai-hint-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(10, 10, 10, 0.8);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 15px 25px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-hint-btn:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
        }

        .ai-hint-btn .pulse {
            width: 10px;
            height: 10px;
            background-color: #00ffcc;
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="game-board">
        <div class="header-hud">
            <div>LOCATION: ANTECHAMBER</div>
            <div class="timer" id="countdown">60:00</div>
        </div>

        <h2>The First Seal</h2>
        <p class="puzzle-text">"I speak without a mouth and hear without ears. I have no body, but I come alive with the wind. To pass, you must name me."</p>

        <div class="input-group">
            <input type="text" id="player-answer" placeholder="Enter cipher...">
            <button class="submit-btn" onclick="checkAnswer()">Unlock</button>
        </div>
        
        <p id="feedback" style="margin-top: 20px; color: #ff3333; display: none;">Incorrect cipher. The mechanism remains locked.</p>
    </div>

    <button class="ai-hint-btn" onclick="openAI()">
        <div class="pulse"></div>
        ACCESS GUARDIAN AI
    </button>

    <script>
        // --- GAME LOGIC ---
        function checkAnswer() {
            const answer = document.getElementById('player-answer').value.toLowerCase().trim();
            const feedback = document.getElementById('feedback');
            
            if (answer === "echo") {
                feedback.style.color = "#00ff00";
                feedback.innerText = "Seal broken. Accessing next chamber...";
                feedback.style.display = "block";
                // Here is where you would link to the next HTML page
            } else {
                feedback.style.color = "#ff3333";
                feedback.innerText = "Incorrect cipher. The mechanism remains locked.";
                feedback.style.display = "block";
            }
        }

        // Timer Logic
        let timeLeft = 3600; // 60 minutes in seconds
        setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            document.getElementById('countdown').innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if(timeLeft > 0) timeLeft--;
        }, 1000);


        // --- BOTPRESS AI INTEGRATION ---
        // 1. Initialize the bot invisibly in the background
        window.botpressWebChat.init({
            "configUrl": "https://files.bpcontent.cloud/2026/03/31/15/20260331155126-9Z3W0Q00.json",
            "hostUrl": "https://cdn.botpress.cloud/webchat/v1",
            "hideWidget": true, // We hide their default button to use our cinematic custom button
            "themeName": "prism",
            "theme": "dark"
        });

        // 2. Function to pop open the chat when the custom button is clicked
        function openAI() {
            window.botpressWebChat.sendEvent({ type: 'show' });
        }
    </script>
</body>
</html>
