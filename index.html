<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: ENIGMA | AI Escape</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <header>
            <h1>PROJECT: ENIGMA</h1>
            <p id="level-indicator">Level: 1 // Initialization</p>
        </header>

        <main>
            <div id="puzzle-screen" class="cinematic-box">
                <h2 id="puzzle-title">System Locked</h2>
                <p id="puzzle-text">Initiating neural link... Awaiting your command.</p>
                
                <div class="input-section">
                    <input type="text" id="player-input" placeholder="Enter override code..." autocomplete="off">
                    <button id="submit-btn">EXECUTE</button>
                </div>
            </div>

            <aside id="ai-terminal" class="cinematic-box">
                <div id="chat-history">
                    <p class="system-msg"><strong>[SYSTEM]:</strong> Boot sequence complete.</p>
                    <p class="system-msg"><strong>[SYSTEM]:</strong> External AI Agent detected. Comm-link open.</p>
                    <p class="ai-msg"><strong>[DIRECTIVE]:</strong> Use the AI comms interface (bottom right) to request hints or analyze clues.</p>
                </div>
                </aside>
        </main>
    </div>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/03/31/15/20260331155126-C69DAEGZ.js" defer></script>
    
    <script src="script.js"></script>
</body>
</html>
