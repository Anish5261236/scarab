<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect's Tomb | AI Escape Room</title>
    
    <script src="https://cdn.botpress.cloud/webchat/v1/inject.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Cinematic Background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1539650116574-8efeb43e2750?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: -1;
            animation: slowZoom 25s infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Main Game Board Layout */
        .game-layout {
            display: flex;
            width: 95%;
            max-width: 1200px;
            height: 85vh;
            gap: 20px;
        }

        /* The Puzzle Interface */
        .game-board {
            flex: 1.5;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(212, 175, 55, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        /* The AI Chat Container */
        .ai-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
            display: none; /* Hidden until game starts */
        }

        /* HUD elements */
        .header-hud {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 15px;
            margin-bottom: 30px;
            font-family: 'Cinzel', serif;
            color: #D4AF37;
            letter-spacing: 2px;
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
        }

        .timer {
            font-size: 1.5em;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            margin: 60px 0 15px 0;
            letter-spacing: 3px;
            color: #e8c35a;
        }

        .puzzle-text {
            font-size: 1.1em;
            line-height: 1.8;
            color: #cccccc;
            margin-bottom: 40px;
            font-style: italic;
            padding: 0 20px;
        }

        /* Interactive Lock Mechanics */
        .lock-mechanism {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .dial-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .dial {
            width: 80px;
            height: 100px;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 2px solid #D4AF37;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(212, 175, 55, 0.2);
            transition: transform 0.1s, box-shadow 0.3s;
        }

        .dial:active {
            transform: scale(0.95) translateY(5px);
        }

        .dial:hover {
            border-color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 25px rgba(212, 175, 55, 0.4);
        }

        .dial-label {
            font-family: 'Cinzel', serif;
            color: #888;
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            background: transparent;
            color: #D4AF37;
            border: 2px solid #D4AF37;
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            padding: 15px 40px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 20px #D4AF37;
        }

        .btn-start {
            font-size: 1.5em;
            padding: 20px 60px;
        }

        #feedback {
            margin-top: 20px;
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            height: 30px;
        }

        /* Start Screen Overlay */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="game-layout">
        
        <div class="game-board">
            
            <div id="start-screen">
                <h1 style="font-family: 'Cinzel', serif; color: #D4AF37; font-size: 3em; margin-bottom: 10px;">The Architect's Tomb</h1>
                <p style="color: #ccc; max-width: 600px; text-align: center; line-height: 1.6; margin-bottom: 40px;">
                    The Guardian AI monitors your every move. Solve the ancient mechanisms to progress deeper into the pyramid. If you require assistance, consult the Guardian terminal. You have 60 minutes.
                </p>
                <button class="btn btn-start" onclick="startGame()">Breach the Tomb</button>
            </div>

            <div class="header-hud">
                <div id="location-text">LOCATION: UNKNOWN</div>
                <div class="timer" id="countdown">60:00</div>
            </div>

            <h2 id="level-title">...</h2>
            <p class="puzzle-text" id="level-story">...</p>

            <div class="lock-mechanism">
                <div class="dial-container">
                    <div class="dial" id="dial-0">𓀀</div>
                    <div class="dial-label">RING I</div>
                </div>
                <div class="dial-container">
                    <div class="dial" id="dial-1">𓀀</div>
                    <div class="dial-label">RING II</div>
                </div>
                <div class="dial-container">
                    <div class="dial" id="dial-2">𓀀</div>
                    <div class="dial-label">RING III</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn" onclick="checkLock()">Engage Mechanism</button>
            </div>
            
            <p id="feedback"></p>
        </div>

        <div class="ai-panel" id="ai-panel">
            <div id="botpress-container" style="width: 100%; height: 100%;"></div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. GAME DATABASE (Add levels here)
        // ==========================================
        const gameLevels = [
            {
                id: 1,
                title: "The Scarab's Sequence",
                location: "ANTECHAMBER",
                storyText: "\"To walk the path of the sun, align the elements of life. First the vessel, then the breath, and finally, the eternal guardian.\"",
                symbols: ['𓀀', '𓃒', '𓆣', '𓉡', '𓋹', '𓎛'],
                solution: [3, 4, 2], // Vessel (𓉡), Breath (𓋹), Scarab (𓆣)
                aiContext: "The player is in the Antechamber. The solution is Vessel (Index 3), Breath (Index 4), Scarab (Index 2). Give them a cryptic riddle about a vessel holding the breath of a scarab if they ask for a hint."
            },
            {
                id: 2,
                title: "The Amulet of Vyshu",
                location: "THE INNER SANCTUM",
                storyText: "\"Only those who remember the lost tales may pass. Two beasts of the earth guard the sacred relic of Vyshu, flanked by the bird of the heavens.\"",
                symbols: ['𓃭', '𓆙', '𓄿', '𓆣', '𓃒'], 
                solution: [0, 4, 2], // Lion (𓃭), Bull (𓃒), Bird (𓄿)
                aiContext: "The player is in the Inner Sanctum trying to unlock the Amulet of Vyshu. The solution requires a Lion (Index 0), a Bull (Index 4), and a Bird (Index 2). Hint at terrestrial beasts guarding the sky."
            }
        ];

        // ==========================================
        // 2. GAME STATE MANAGEMENT
        // ==========================================
        let currentLevelIndex = 0;
        let currentDials = [0, 0, 0];
        let isGameActive = false;
        let timeLeft = 3600; 
        let timerInterval;

        // Initialize Botpress quietly in the background
        window.botpressWebChat.init({
            "configUrl": "https://files.bpcontent.cloud/2026/03/31/15/20260331155126-9Z3W0Q00.json",
            "containerElementId": "botpress-container", 
            "hideWidget": true, 
            "themeName": "prism",
            "theme": "dark",
            "enableConversationDeletion": true
        });

        // ==========================================
        // 3. CORE ENGINE FUNCTIONS
        // ==========================================
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ai-panel').style.display = 'block';
            
            // Force Botpress to show inside the panel
            window.botpressWebChat.sendEvent({ type: 'show' });
            
            // Start the timer
            timerInterval = setInterval(updateTimer, 1000);
            
            loadLevel(currentLevelIndex);
        }

        function loadLevel(index) {
            if(index >= gameLevels.length) {
                winGame();
                return;
            }

            const levelData = gameLevels[index];
            
            // Update UI
            document.getElementById('location-text').innerText = `LOCATION: ${levelData.location}`;
            document.getElementById('level-title').innerText = levelData.title;
            document.getElementById('level-story').innerText = levelData.storyText;
            document.getElementById('feedback').innerText = "";
            
            // Reset and wire up dials
            currentDials = [0, 0, 0];
            for(let i=0; i<3; i++) {
                let dial = document.getElementById(`dial-${i}`);
                dial.innerText = levelData.symbols[0];
                dial.onclick = () => rotateDial(i, levelData.symbols);
            }

            // Send silent context to the AI
            setTimeout(() => {
                window.botpressWebChat.sendPayload({
                    type: 'text',
                    text: `[SYSTEM OVERRIDE] ${levelData.aiContext}`
                });
            }, 1000); // Slight delay to ensure bot is ready
            
            isGameActive = true;
        }

        function rotateDial(dialIndex, symbolArray) {
            if(!isGameActive) return;
            currentDials[dialIndex] = (currentDials[dialIndex] + 1) % symbolArray.length;
            document.getElementById(`dial-${dialIndex}`).innerText = symbolArray[currentDials[dialIndex]];
        }

        function checkLock() {
            if(!isGameActive) return;

            const levelData = gameLevels[currentLevelIndex];
            const feedback = document.getElementById('feedback');
            
            if (currentDials[0] === levelData.solution[0] && 
                currentDials[1] === levelData.solution[1] && 
                currentDials[2] === levelData.solution[2]) {
                
                isGameActive = false; 
                feedback.style.color = "#00ff00";
                feedback.style.textShadow = "0 0 10px rgba(0, 255, 0, 0.5)";
                feedback.innerText = "Mechanism engaged. The heavy stone doors grind open...";
                
                setTimeout(() => {
                    currentLevelIndex++;
                    loadLevel(currentLevelIndex);
                }, 3500);

            } else {
                feedback.style.color = "#ff3333";
                feedback.style.textShadow = "0 0 10px rgba(255, 51, 51, 0.5)";
                feedback.innerText = "The gears grind, but the lock holds fast.";
                
                // Screen shake effect
                const board = document.querySelector('.game-board');
                board.style.transform = 'translateX(10px)';
                setTimeout(() => board.style.transform = 'translateX(-10px)', 50);
                setTimeout(() => board.style.transform = 'translateX(10px)', 100);
                setTimeout(() => board.style.transform = 'translateX(0)', 150);
            }
        }

        function updateTimer() {
            if(isGameActive && timeLeft > 0) {
                timeLeft--;
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                document.getElementById('countdown').innerText = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if(timeLeft === 0) loseGame();
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            document.querySelector('.game-board').innerHTML = `
                <h2 style="color:#00ff00; text-shadow: 0 0 20px #00ff00;">You Escaped.</h2>
                <p style="font-size: 1.2em; color: #ccc;">The pyramid relinquishes its secrets. You survive.</p>
            `;
        }

        function loseGame() {
            isGameActive = false;
            clearInterval(timerInterval);
            document.querySelector('.game-board').innerHTML = `
                <h2 style="color:#ff3333; text-shadow: 0 0 20px #ff3333;">Sealed Forever.</h2>
                <p style="font-size: 1.2em; color: #ccc;">Your time has run out. You belong to the tomb now.</p>
            `;
        }
    </script>
</body>
</html>
