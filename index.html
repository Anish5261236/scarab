<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect's Tomb | AI Escape Room</title>
    
    <script src="https://cdn.botpress.cloud/webchat/v1/inject.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden;
        }

        /* Cinematic Background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1539650116574-8efeb43e2750?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: -1;
            animation: slowZoom 20s infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Glassmorphism Panel */
        .container {
            position: relative;
            width: 90%;
            max-width: 800px;
            margin: 8vh auto;
            padding: 40px;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3em;
            color: #D4AF37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #cccccc;
            margin-bottom: 30px;
        }

        /* Start Button */
        .start-btn {
            background: transparent;
            color: #D4AF37;
            font-family: 'Cinzel', serif;
            font-size: 1.5em;
            padding: 15px 40px;
            border: 2px solid #D4AF37;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .start-btn:hover {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 20px #D4AF37;
        }

        /* Container designed to hold the embedded bot */
        #bot-container {
            display: none; /* Hidden until sequence initializes */
            width: 100%;
            height: 500px;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            overflow: hidden;
            position: relative;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
