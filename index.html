<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Architect's Tomb</title>

<style>
body {
    margin:0;
    font-family: 'Montserrat', sans-serif;
    background:#050505;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.game {
    width:90%;
    max-width:700px;
    background:rgba(0,0,0,0.8);
    padding:40px;
    border:1px solid #D4AF37;
    border-radius:12px;
    text-align:center;
}

h2 { color:#e8c35a; }

.dials { display:flex; justify-content:center; gap:20px; margin:20px 0; }

.dial {
    width:70px; height:90px;
    display:flex; align-items:center; justify-content:center;
    border:2px solid #D4AF37;
    font-size:2em;
    cursor:pointer;
}

button {
    padding:10px 20px;
    margin-top:10px;
    background:none;
    border:2px solid #D4AF37;
    color:#D4AF37;
    cursor:pointer;
}

#hintBox { margin-top:15px; color:#00ffcc; }
#feedback { margin-top:15px; }
</style>
</head>

<body>

<div class="game">
    <h2 id="title"></h2>
    <p id="story"></p>

    <div id="puzzle"></div>

    <button onclick="submitAnswer()">Engage</button>
    <button onclick="getHint()">Hint</button>

    <div id="hintBox"></div>
    <div id="feedback"></div>
</div>

<script>

// ---------------- GAME DATA ----------------

const levels = [
{
    id:1,
    type:"dial",
    title:"The Scarab's Sequence",
    story:"Align life: vessel → breath → guardian",
    symbols:['𓀀','𓃒','𓆣','𓉡','𓋹'],
    solution:[3,4,2],
    hints:[
        "Life begins with a vessel",
        "Breath is life force",
        "Guardian protects eternity"
    ]
},

{
    id:2,
    type:"riddle",
    title:"The Silent Watcher",
    story:"I see all but have no eyes. I guard but never move.",
    solution:"statue",
    hints:[
        "It stands still",
        "Found in temples",
        "Stone watcher"
    ]
},

{
    id:3,
    type:"memory",
    title:"Echoes of the Past",
    story:"Remember the sequence",
    sequence:['𓆣','𓋹','𓉡'],
    hints:[
        "Watch carefully",
        "It repeats",
        "Same order"
    ]
}
];

// ---------------- STATE ----------------

let currentLevel = parseInt(localStorage.getItem("level")) || 1;
let hintStep = 0;
let dialState = [0,0,0];
let memoryInput = [];

// ---------------- LOAD LEVEL ----------------

function loadLevel() {
    hintStep = 0;
    document.getElementById("hintBox").innerText="";
    document.getElementById("feedback").innerText="";

    const level = levels.find(l => l.id === currentLevel);

    document.getElementById("title").innerText = level.title;
    document.getElementById("story").innerText = level.story;

    const puzzleDiv = document.getElementById("puzzle");
    puzzleDiv.innerHTML = "";

    if(level.type === "dial") {
        puzzleDiv.innerHTML = `<div class="dials">
            <div class="dial" onclick="rotate(0)">𓀀</div>
            <div class="dial" onclick="rotate(1)">𓀀</div>
            <div class="dial" onclick="rotate(2)">𓀀</div>
        </div>`;
    }

    if(level.type === "riddle") {
        puzzleDiv.innerHTML = `<input id="answer" placeholder="Type answer">`;
    }

    if(level.type === "memory") {
        showSequence(level.sequence);
    }
}

// ---------------- DIAL ----------------

function rotate(i){
    const level = levels[currentLevel-1];
    dialState[i] = (dialState[i]+1)%level.symbols.length;
    document.querySelectorAll(".dial")[i].innerText = level.symbols[dialState[i]];
}

// ---------------- MEMORY ----------------

function showSequence(seq){
    let i=0;
    const interval = setInterval(()=>{
        document.getElementById("puzzle").innerText = seq[i];
        i++;
        if(i>=seq.length){
            clearInterval(interval);
            setTimeout(()=>{
                document.getElementById("puzzle").innerHTML =
                `<input id="memoryInput" placeholder="Enter symbols without space">`;
            },800);
        }
    },800);
}

// ---------------- SUBMIT ----------------

function submitAnswer(){
    const level = levels[currentLevel-1];
    let correct = false;

    if(level.type==="dial"){
        correct = JSON.stringify(dialState) === JSON.stringify(level.solution);
    }

    if(level.type==="riddle"){
        const val = document.getElementById("answer").value.toLowerCase();
        correct = val === level.solution;
    }

    if(level.type==="memory"){
        const val = document.getElementById("memoryInput").value;
        correct = val === level.sequence.join('');
    }

    if(correct){
        document.getElementById("feedback").innerText="Unlocked!";
        nextLevel();
    } else {
        document.getElementById("feedback").innerText="Wrong!";
    }
}

// ---------------- NEXT LEVEL ----------------

function nextLevel(){
    currentLevel++;
    localStorage.setItem("level", currentLevel);

    if(currentLevel > levels.length){
        document.querySelector(".game").innerHTML =
        "<h2>You Escaped the Tomb</h2>";
    } else {
        setTimeout(loadLevel,1000);
    }
}

// ---------------- HINT SYSTEM ----------------

function getHint(){
    const level = levels[currentLevel-1];

    if(hintStep < level.hints.length){
        document.getElementById("hintBox").innerText = level.hints[hintStep];
        hintStep++;
    } else {
        document.getElementById("hintBox").innerText = "No more hints.";
    }
}

// ---------------- INIT ----------------

loadLevel();

</script>

</body>
</html>
